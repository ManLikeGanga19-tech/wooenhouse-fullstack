# /etc/apache2/sites-available/woodenhouseskenya.com.conf
# Handles BOTH woodenhouseskenya.com AND admin.woodenhouseskenya.com
# since both are served by the same Next.js app on port 3000

<VirtualHost *:80>
    ServerName  woodenhouseskenya.com
    ServerAlias www.woodenhouseskenya.com admin.woodenhouseskenya.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName  woodenhouseskenya.com
    ServerAlias www.woodenhouseskenya.com admin.woodenhouseskenya.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/woodenhouseskenya.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/woodenhouseskenya.com/privkey.pem

    # Proxy to Next.js app on port 3000
    ProxyPreserveHost On
    ProxyPass         / http://localhost:3000/
    ProxyPassReverse  / http://localhost:3000/

    # Pass the original Host so Next.js middleware can detect the subdomain
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Forwarded-For  "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # Security
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always unset Server
    Header always unset X-Powered-By

    ErrorLog  ${APACHE_LOG_DIR}/woodenhouseskenya.com-error.log
    CustomLog ${APACHE_LOG_DIR}/woodenhouseskenya.com-access.log combined
</VirtualHost>
