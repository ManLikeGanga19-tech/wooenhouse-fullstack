# /etc/apache2/sites-available/api.woodenhouseskenya.com.conf
# or in cPanel: use the "Include" box in the domain's Apache config
#
# Enable required modules first:
#   sudo a2enmod proxy proxy_http proxy_html headers rewrite ssl
#   sudo systemctl restart apache2

<VirtualHost *:80>
    ServerName api.woodenhouseskenya.com
    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://api.woodenhouseskenya.com$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName api.woodenhouseskenya.com

    # SSL — cPanel Let's Encrypt will fill these in
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/api.woodenhouseskenya.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.woodenhouseskenya.com/privkey.pem

    # Proxy to the .NET app running on port 5000
    ProxyPreserveHost On
    ProxyPass         / http://localhost:5000/
    ProxyPassReverse  / http://localhost:5000/

    # Forward real client IP to the app
    RequestHeader set X-Forwarded-For  "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP        "%{REMOTE_ADDR}s"

    # Security headers (also set in C# middleware but belt-and-suspenders)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always unset Server
    Header always unset X-Powered-By

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/api.woodenhouseskenya.com-error.log
    CustomLog ${APACHE_LOG_DIR}/api.woodenhouseskenya.com-access.log combined
</VirtualHost>
